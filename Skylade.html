<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Electric Monster</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {
  x: canvas.width / 2,
  y: canvas.height / 2
};

// следим за мышкой
window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// частицы (щупальца)
class Tentacle {
  constructor(angle) {
    this.angle = angle;
    this.length = 100 + Math.random() * 100;
    this.segments = [];
    
    for (let i = 0; i < 20; i++) {
      this.segments.push({
        x: mouse.x,
        y: mouse.y
      });
    }
  }

  update() {
    // голова следует за мышкой
    this.segments[0].x += (mouse.x - this.segments[0].x) * 0.1;
    this.segments[0].y += (mouse.y - this.segments[0].y) * 0.1;

    // остальные сегменты тянутся
    for (let i = 1; i < this.segments.length; i++) {
      let dx = this.segments[i - 1].x - this.segments[i].x;
      let dy = this.segments[i - 1].y - this.segments[i].y;

      this.segments[i].x += dx * 0.3;
      this.segments[i].y += dy * 0.3;
    }
  }

  draw() {
    ctx.beginPath();
    ctx.moveTo(this.segments[0].x, this.segments[0].y);

    for (let i = 1; i < this.segments.length; i++) {
      ctx.lineTo(this.segments[i].x, this.segments[i].y);
    }

    ctx.strokeStyle = "rgba(0, 150, 255, 0.8)";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "cyan";
    ctx.stroke();
  }
}

// создаём «монстра»
let tentacles = [];
for (let i = 0; i < 25; i++) {
  tentacles.push(new Tentacle((Math.PI * 2 / 25) * i));
}

// анимация
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  tentacles.forEach(t => {
    t.update();
    t.draw();
  });

  requestAnimationFrame(animate);
}

animate();

// адаптация под размер окна
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
