<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuron TikTok Effect</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#000;
}
canvas{
display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,15,55);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 22;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// LIGHTS
const light1 = new THREE.PointLight(0xffffff,4,100);
light1.position.set(0,0,8);
scene.add(light1);

const light2 = new THREE.PointLight(0x4488ff,3,100);
light2.position.set(10,5,15);
scene.add(light2);

// CORE
const core = new THREE.Mesh(
new THREE.SphereGeometry(1.3,64,64),
new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x88ccff,
emissiveIntensity:2,
roughness:0.2,
metalness:0.1
})
);

scene.add(core);

// BRANCHES
const branches = [];

function createBranch(angle){

let points = [];
points.push(new THREE.Vector3(0,0,0));

let x=0,y=0,z=0;

for(let i=0;i<20;i++){

x += Math.cos(angle)*0.75 + (Math.random()-0.5)*0.6;
y += Math.sin(angle)*0.75 + (Math.random()-0.5)*0.6;
z += (Math.random()-0.5)*0.8;

points.push(new THREE.Vector3(x,y,z));
}

const curve = new THREE.CatmullRomCurve3(points);

const geo = new THREE.TubeGeometry(
curve,
120,
0.06,
10,
false
);

const mat = new THREE.MeshBasicMaterial({
color:new THREE.Color(
"hsl("+(180+Math.random()*120)+",100%,70%)"
)
});

const mesh = new THREE.Mesh(geo,mat);

scene.add(mesh);
branches.push(mesh);
}

for(let i=0;i<32;i++){
createBranch((Math.PI*2/32)*i);
}

// PARTICLES
const particles = [];

for(let i=0;i<180;i++){

const p = new THREE.Mesh(
new THREE.SphereGeometry(0.04,6,6),
new THREE.MeshBasicMaterial({
color:0xffffff
})
);

p.position.set(
(Math.random()-0.5)*35,
(Math.random()-0.5)*35,
(Math.random()-0.5)*35
);

p.speed = Math.random()*0.08+0.02;

scene.add(p);
particles.push(p);
}

// CAMERA MOTION
let t = 0;

// ANIMATE
function animate(){

requestAnimationFrame(animate);

t += 0.003;

// CAMERA FLOAT
camera.position.x = Math.sin(t)*2.2;
camera.position.y = Math.cos(t*1.2)*1.2;
camera.lookAt(0,0,0);

// CORE PULSE
let pulse = 1 + Math.sin(Date.now()*0.006)*0.14;
core.scale.set(pulse,pulse,pulse);
core.rotation.y += 0.015;

// SCENE ROTATE
scene.rotation.y += 0.0015;

// BRANCH COLOR FLOW
branches.forEach((b,i)=>{
b.rotation.z += 0.0008;
b.material.color.offsetHSL(0.0015,0,0);
});

// PARTICLES MOVE
particles.forEach(p=>{

p.position.z += p.speed;

if(p.position.z > 18){
p.position.z = -18;
p.position.x = (Math.random()-0.5)*35;
p.position.y = (Math.random()-0.5)*35;
}

});

// RENDER
renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>
</body>
</html>
